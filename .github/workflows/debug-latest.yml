name: debug-latest

"on":
  push:
    branches:
      - master
    tags-ignore:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.41.9"

jobs:
  build-go-cli:
    name: Build Go CLI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: false

      - name: Validate and build Windows CLI
        shell: bash
        run: |
          set -euo pipefail

          export GOWORK=off
          mkdir -p dist

          go test ./... -count=1

          GOOS=windows GOARCH=amd64 go build -o dist/clipboardnode-windows-amd64.exe ./cmd/clipboardnode
          GOOS=windows GOARCH=amd64 go build -o dist/clipboardnode-bridge-windows-amd64.exe ./cmd/clipboardnode-bridge

          for asset in dist/clipboardnode-windows-amd64.exe dist/clipboardnode-bridge-windows-amd64.exe; do
            if [[ ! -f "${asset}" ]]; then
              echo "Missing Go artifact: ${asset}" >&2
              exit 1
            fi
            printf -- '- %s (%s bytes)\n' "$(basename "${asset}")" "$(stat -c%s "${asset}")" >> "${GITHUB_STEP_SUMMARY}"
          done

      - name: Upload Go CLI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: myflowhub-clipboardnode-go-cli-debug
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/clipboardnode-windows-amd64.exe
            dist/clipboardnode-bridge-windows-amd64.exe

  build-windows-debug:
    name: Build Windows debug
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Validate and build Flutter Windows app
        shell: pwsh
        working-directory: app
        run: |
          $ErrorActionPreference = "Stop"

          flutter --version
          if ($LASTEXITCODE -ne 0) { throw "flutter --version failed with exit code $LASTEXITCODE" }

          flutter pub get
          if ($LASTEXITCODE -ne 0) { throw "flutter pub get failed with exit code $LASTEXITCODE" }

          flutter analyze
          if ($LASTEXITCODE -ne 0) { throw "flutter analyze failed with exit code $LASTEXITCODE" }

          flutter test
          if ($LASTEXITCODE -ne 0) { throw "flutter test failed with exit code $LASTEXITCODE" }

          Set-Location ..
          $env:GOWORK = "off"
          go build -o "app/clipboardnode-bridge.exe" ./cmd/clipboardnode-bridge
          if ($LASTEXITCODE -ne 0) { throw "go build clipboardnode-bridge failed with exit code $LASTEXITCODE" }
          Set-Location app

          flutter build windows --debug
          if ($LASTEXITCODE -ne 0) { throw "flutter build windows failed with exit code $LASTEXITCODE" }

      - name: Package Windows debug app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $runnerDir = Join-Path $PWD "app/build/windows/x64/runner/Debug"
          if (-not (Test-Path -LiteralPath $runnerDir)) {
            throw "Flutter Windows debug output was not found: $runnerDir"
          }

          $appExe = Get-ChildItem -LiteralPath $runnerDir -Filter "*.exe" -File | Select-Object -First 1
          if ($null -eq $appExe) {
            throw "Flutter Windows debug output does not contain an executable: $runnerDir"
          }

          if (Test-Path -LiteralPath "dist") {
            Remove-Item -LiteralPath "dist" -Recurse -Force
          }

          $packageRoot = Join-Path $PWD "dist/myflowhub-clipboardnode-windows-debug"
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item -Path "$runnerDir/*" -Destination $packageRoot -Recurse -Force
          Copy-Item -LiteralPath "app/clipboardnode-bridge.exe" -Destination (Join-Path $packageRoot "clipboardnode-bridge.exe") -Force

          $buildInfo = @(
            "repo=$env:GITHUB_REPOSITORY"
            "commit=$env:GITHUB_SHA"
            "run_id=$env:GITHUB_RUN_ID"
            "run_attempt=$env:GITHUB_RUN_ATTEMPT"
            "platform=windows"
            "app_exe=$($appExe.Name)"
          ) -join "`n"
          Set-Content -LiteralPath (Join-Path $packageRoot "build-info.txt") -Value $buildInfo -Encoding utf8

          $zipPath = Join-Path $PWD "dist/myflowhub-clipboardnode-windows-debug.zip"
          Compress-Archive -Path "$packageRoot/*" -DestinationPath $zipPath -Force

          if (-not (Test-Path -LiteralPath $zipPath)) {
            throw "Missing packaged Windows zip: $zipPath"
          }

          Get-ChildItem -LiteralPath "dist" -File | ForEach-Object {
            "- $($_.Name) ($($_.Length) bytes)" | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
          }

      - name: Upload Windows debug artifact
        uses: actions/upload-artifact@v7
        with:
          name: myflowhub-clipboardnode-windows-debug
          if-no-files-found: error
          retention-days: 14
          path: dist/myflowhub-clipboardnode-windows-debug.zip

  build-linux-debug:
    name: Build Linux debug
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux desktop dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build Flutter Linux app
        shell: bash
        working-directory: app
        run: |
          set -euo pipefail
          flutter --version
          flutter config --enable-linux-desktop
          flutter pub get
          cd ..
          export GOWORK=off
          go build -o app/clipboardnode-bridge ./cmd/clipboardnode-bridge
          cd app
          flutter build linux --debug

      - name: Package Linux debug app
        shell: bash
        run: |
          set -euo pipefail

          bundle_dir="app/build/linux/x64/debug/bundle"
          if [[ ! -d "${bundle_dir}" ]]; then
            echo "Flutter Linux debug bundle was not found: ${bundle_dir}" >&2
            exit 1
          fi
          if [[ ! -f "${bundle_dir}/myflowhub_clipboard" ]]; then
            echo "Flutter Linux debug bundle does not contain the app binary" >&2
            find "${bundle_dir}" -maxdepth 2 -type f -print >&2 || true
            exit 1
          fi

          rm -rf dist
          package_root="dist/myflowhub-clipboardnode-linux-debug"
          mkdir -p "${package_root}"
          cp -a "${bundle_dir}/." "${package_root}/"
          cp app/clipboardnode-bridge "${package_root}/clipboardnode-bridge"
          {
            echo "repo=${GITHUB_REPOSITORY}"
            echo "commit=${GITHUB_SHA}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "platform=linux"
            echo "app_binary=myflowhub_clipboard"
          } > "${package_root}/build-info.txt"

          tar -czf dist/myflowhub-clipboardnode-linux-debug.tar.gz -C dist myflowhub-clipboardnode-linux-debug
          if [[ ! -f dist/myflowhub-clipboardnode-linux-debug.tar.gz ]]; then
            echo "Missing packaged Linux archive" >&2
            exit 1
          fi
          printf -- '- %s (%s bytes)\n' "myflowhub-clipboardnode-linux-debug.tar.gz" "$(stat -c%s dist/myflowhub-clipboardnode-linux-debug.tar.gz)" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Linux debug artifact
        uses: actions/upload-artifact@v7
        with:
          name: myflowhub-clipboardnode-linux-debug
          if-no-files-found: error
          retention-days: 14
          path: dist/myflowhub-clipboardnode-linux-debug.tar.gz

  build-macos-debug:
    name: Build macOS debug
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build Flutter macOS app
        shell: bash
        working-directory: app
        run: |
          set -euo pipefail
          flutter --version
          flutter config --enable-macos-desktop
          flutter pub get
          cd ..
          export GOWORK=off
          go build -o app/clipboardnode-bridge ./cmd/clipboardnode-bridge
          cd app
          flutter build macos --debug

      - name: Package macOS debug app
        shell: bash
        run: |
          set -euo pipefail

          app_dir="app/build/macos/Build/Products/Debug/myflowhub_clipboard.app"
          if [[ ! -d "${app_dir}" ]]; then
            echo "Flutter macOS debug app was not found: ${app_dir}" >&2
            find app/build/macos -maxdepth 5 -type d -name "*.app" -print >&2 || true
            exit 1
          fi

          rm -rf dist
          mkdir -p dist
          {
            echo "repo=${GITHUB_REPOSITORY}"
            echo "commit=${GITHUB_SHA}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "platform=macos"
            echo "app_bundle=myflowhub_clipboard.app"
          } > "app/build/macos/Build/Products/Debug/build-info.txt"
          cp app/clipboardnode-bridge "${app_dir}/Contents/MacOS/clipboardnode-bridge"

          ditto -c -k --sequesterRsrc --keepParent "${app_dir}" dist/myflowhub-clipboardnode-macos-debug.zip
          zip -j dist/myflowhub-clipboardnode-macos-debug.zip "app/build/macos/Build/Products/Debug/build-info.txt"
          if [[ ! -f dist/myflowhub-clipboardnode-macos-debug.zip ]]; then
            echo "Missing packaged macOS zip" >&2
            exit 1
          fi
          printf -- '- %s (%s bytes)\n' "myflowhub-clipboardnode-macos-debug.zip" "$(stat -f%z dist/myflowhub-clipboardnode-macos-debug.zip)" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload macOS debug artifact
        uses: actions/upload-artifact@v7
        with:
          name: myflowhub-clipboardnode-macos-debug
          if-no-files-found: error
          retention-days: 14
          path: dist/myflowhub-clipboardnode-macos-debug.zip

  build-android-debug:
    name: Build Android debug
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Prepare Android SDK for gomobile
        shell: bash
        run: |
          set -euo pipefail

          android_sdk="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [[ -z "${android_sdk}" ]]; then
            echo "ANDROID_HOME or ANDROID_SDK_ROOT must be set before gomobile Android builds" >&2
            exit 1
          fi

          echo "ANDROID_HOME=${android_sdk}" >> "${GITHUB_ENV}"
          echo "ANDROID_SDK_ROOT=${android_sdk}" >> "${GITHUB_ENV}"

          sdkmanager_bin="${android_sdk}/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "${sdkmanager_bin}" ]]; then
            sdkmanager_bin="$(command -v sdkmanager || true)"
          fi
          if [[ -z "${sdkmanager_bin}" ]]; then
            echo "sdkmanager was not found; cannot prepare Android NDK for gomobile" >&2
            exit 1
          fi

          ndk_version="27.0.12077973"
          ndk_path="${android_sdk}/ndk/${ndk_version}"
          yes | "${sdkmanager_bin}" --licenses >/dev/null || true
          "${sdkmanager_bin}" "platforms;android-26"
          if [[ ! -d "${ndk_path}" ]]; then
            "${sdkmanager_bin}" "ndk;${ndk_version}"
          fi

          echo "ANDROID_NDK_HOME=${ndk_path}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_ROOT=${ndk_path}" >> "${GITHUB_ENV}"

      - name: Build gomobile AAR
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/build_aar.sh android/arm64,android/arm,android/amd64,android/386 com.myflowhub.gomobile app/android/app/libs/myflowhub.aar 2>&1 | tee gomobile-build.log
          if [[ ! -f app/android/app/libs/myflowhub.aar ]]; then
            echo "gomobile AAR was not generated" >&2
            exit 1
          fi
          printf -- '- %s (%s bytes)\n' "myflowhub.aar" "$(stat -c%s app/android/app/libs/myflowhub.aar)" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload gomobile build log
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: myflowhub-clipboardnode-gomobile-build-log
          if-no-files-found: ignore
          retention-days: 14
          path: gomobile-build.log

      - name: Upload gomobile AAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: myflowhub-clipboardnode-android-gomobile-aar
          if-no-files-found: error
          retention-days: 14
          path: app/android/app/libs/myflowhub.aar

      - name: Build Flutter Android APK
        shell: bash
        working-directory: app
        run: |
          set -euo pipefail
          flutter --version
          flutter pub get
          flutter build apk --debug

      - name: Package Android debug APK
        shell: bash
        run: |
          set -euo pipefail

          apk_path="app/build/app/outputs/flutter-apk/app-debug.apk"
          if [[ ! -f "${apk_path}" ]]; then
            echo "Flutter Android debug APK was not found: ${apk_path}" >&2
            find app/build/app/outputs -maxdepth 4 -type f -print >&2 || true
            exit 1
          fi

          rm -rf dist
          mkdir -p dist
          cp "${apk_path}" dist/myflowhub-clipboardnode-android-debug.apk
          if [[ ! -f dist/myflowhub-clipboardnode-android-debug.apk ]]; then
            echo "Missing packaged Android APK" >&2
            exit 1
          fi
          printf -- '- %s (%s bytes)\n' "myflowhub-clipboardnode-android-debug.apk" "$(stat -c%s dist/myflowhub-clipboardnode-android-debug.apk)" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Android debug artifact
        uses: actions/upload-artifact@v7
        with:
          name: myflowhub-clipboardnode-android-debug
          if-no-files-found: error
          retention-days: 14
          path: dist/myflowhub-clipboardnode-android-debug.apk

  build-ios-debug:
    name: Build iOS simulator debug
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build Flutter iOS simulator app
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/build_ios_xcframework.sh iossimulator app/ios/Frameworks/Nodemobile.xcframework 2>&1 | tee gomobile-ios-build.log
          if [[ ! -d app/ios/Frameworks/Nodemobile.xcframework ]]; then
            echo "Nodemobile.xcframework was not generated" >&2
            exit 1
          fi
          cd app
          flutter --version
          flutter pub get
          flutter build ios --debug --simulator --no-codesign

      - name: Upload iOS gomobile build log
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: myflowhub-clipboardnode-ios-gomobile-build-log
          if-no-files-found: ignore
          retention-days: 14
          path: gomobile-ios-build.log

      - name: Package iOS simulator debug app
        shell: bash
        run: |
          set -euo pipefail

          app_dir="app/build/ios/iphonesimulator/Runner.app"
          if [[ ! -d "${app_dir}" ]]; then
            echo "Flutter iOS simulator debug app was not found: ${app_dir}" >&2
            find app/build/ios -maxdepth 5 -type d -name "*.app" -print >&2 || true
            exit 1
          fi

          rm -rf dist
          mkdir -p dist
          {
            echo "repo=${GITHUB_REPOSITORY}"
            echo "commit=${GITHUB_SHA}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "platform=ios-simulator"
            echo "app_bundle=Runner.app"
          } > "app/build/ios/iphonesimulator/build-info.txt"

          ditto -c -k --sequesterRsrc --keepParent "${app_dir}" dist/myflowhub-clipboardnode-ios-simulator-debug.zip
          zip -j dist/myflowhub-clipboardnode-ios-simulator-debug.zip "app/build/ios/iphonesimulator/build-info.txt"
          if [[ ! -f dist/myflowhub-clipboardnode-ios-simulator-debug.zip ]]; then
            echo "Missing packaged iOS simulator zip" >&2
            exit 1
          fi
          printf -- '- %s (%s bytes)\n' "myflowhub-clipboardnode-ios-simulator-debug.zip" "$(stat -f%z dist/myflowhub-clipboardnode-ios-simulator-debug.zip)" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload iOS simulator debug artifact
        uses: actions/upload-artifact@v7
        with:
          name: myflowhub-clipboardnode-ios-simulator-debug
          if-no-files-found: error
          retention-days: 14
          path: dist/myflowhub-clipboardnode-ios-simulator-debug.zip

  build-web-debug:
    name: Build Web debug
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build Flutter Web app
        shell: bash
        working-directory: app
        run: |
          set -euo pipefail
          flutter --version
          flutter pub get
          flutter build web --debug

      - name: Package Web debug app
        shell: bash
        run: |
          set -euo pipefail

          web_dir="app/build/web"
          if [[ ! -d "${web_dir}" ]]; then
            echo "Flutter Web output was not found: ${web_dir}" >&2
            exit 1
          fi
          if [[ ! -f "${web_dir}/index.html" ]]; then
            echo "Flutter Web output does not contain index.html" >&2
            find "${web_dir}" -maxdepth 2 -type f -print >&2 || true
            exit 1
          fi

          rm -rf dist
          package_root="dist/myflowhub-clipboardnode-web-debug"
          mkdir -p "${package_root}"
          cp -a "${web_dir}/." "${package_root}/"
          {
            echo "repo=${GITHUB_REPOSITORY}"
            echo "commit=${GITHUB_SHA}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "platform=web"
          } > "${package_root}/build-info.txt"

          (cd dist && zip -qr myflowhub-clipboardnode-web-debug.zip myflowhub-clipboardnode-web-debug)
          if [[ ! -f dist/myflowhub-clipboardnode-web-debug.zip ]]; then
            echo "Missing packaged Web zip" >&2
            exit 1
          fi
          printf -- '- %s (%s bytes)\n' "myflowhub-clipboardnode-web-debug.zip" "$(stat -c%s dist/myflowhub-clipboardnode-web-debug.zip)" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Web debug artifact
        uses: actions/upload-artifact@v7
        with:
          name: myflowhub-clipboardnode-web-debug
          if-no-files-found: error
          retention-days: 14
          path: dist/myflowhub-clipboardnode-web-debug.zip

  publish-debug-latest:
    name: Publish debug-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      - build-go-cli
      - build-windows-debug
      - build-linux-debug
      - build-macos-debug
      - build-android-debug
      - build-ios-debug
      - build-web-debug
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    concurrency:
      group: myflowhub-clipboardnode-debug-latest
      cancel-in-progress: true

    steps:
      - name: Download debug artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish debug-latest release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY}"
          tag="debug-latest"
          sha="${GITHUB_SHA}"
          required_assets=(
            "myflowhub-clipboardnode-windows-debug.zip"
            "myflowhub-clipboardnode-linux-debug.tar.gz"
            "myflowhub-clipboardnode-macos-debug.zip"
            "myflowhub-clipboardnode-android-debug.apk"
            "myflowhub-clipboardnode-ios-simulator-debug.zip"
            "myflowhub-clipboardnode-web-debug.zip"
            "clipboardnode-windows-amd64.exe"
            "clipboardnode-bridge-windows-amd64.exe"
          )

          upload_args=()
          for asset in "${required_assets[@]}"; do
            path="artifacts/${asset}"
            if [[ ! -f "${path}" ]]; then
              echo "Missing required debug asset: ${path}" >&2
              find artifacts -maxdepth 3 -type f -print >&2 || true
              exit 1
            fi
            upload_args+=("${path}")
          done

          if gh api "repos/${repo}/git/ref/tags/${tag}" >/dev/null 2>&1; then
            gh api --method PATCH "repos/${repo}/git/refs/tags/${tag}" \
              -f sha="${sha}" \
              -F force=true \
              >/dev/null
          else
            gh api --method POST "repos/${repo}/git/refs" \
              -f ref="refs/tags/${tag}" \
              -f sha="${sha}" \
              >/dev/null
          fi

          release_title="Debug (latest)"
          run_url="${GITHUB_SERVER_URL}/${repo}/actions/runs/${GITHUB_RUN_ID}"
          release_notes_file="$(mktemp)"
          {
            echo "自动构建的全平台 Debug 版本（master）。"
            echo
            echo "commit=${sha}"
            echo "run=${run_url}"
            echo
            echo "Assets:"
            for asset in "${required_assets[@]}"; do
              echo "- ${asset}"
            done
          } > "${release_notes_file}"

          if gh release view "${tag}" --repo "${repo}" >/dev/null 2>&1; then
            gh release edit "${tag}" --repo "${repo}" --title "${release_title}" --notes-file "${release_notes_file}" --prerelease
          else
            gh release create "${tag}" --repo "${repo}" --title "${release_title}" --notes-file "${release_notes_file}" --prerelease
          fi

          gh release upload "${tag}" "${upload_args[@]}" --repo "${repo}" --clobber

          release_url="https://github.com/${repo}/releases/tag/${tag}"
          {
            echo "## Debug Assets"
            echo
            echo "- Release: ${release_url}"
            echo "- Commit: \`${sha}\`"
            for asset in "${required_assets[@]}"; do
              echo "- https://github.com/${repo}/releases/download/${tag}/${asset}"
            done
          } >> "${GITHUB_STEP_SUMMARY}"
